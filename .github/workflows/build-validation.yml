name: Build Validation

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Build documentation
        run: pnpm docs:build

      - name: Build Cockpit through package script
        run: pnpm --filter lumal-cockpit build

      - name: Build DataV guide through package script
        run: pnpm --filter lumal-datav-guide build
