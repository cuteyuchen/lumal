name: Deployment Artifacts

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deployment-artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-static-sites:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm docs:build
      - run: pnpm admin:build
      - run: pnpm --filter @luma/cockpit build
      - run: pnpm --filter luma-cockpit build
      - run: pnpm --filter @luma/datav build
      - run: pnpm --filter luma-datav-guide build
      - run: pnpm compat:build

      - name: Upload static site artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luma-static-sites-${{ github.sha }}
          if-no-files-found: error
          path: |
            apps/luma-docs/dist
            apps/luma-admin/dist
            apps/luma-cockpit/dist
            apps/luma-datav-guide/dist
            apps/vben-compat-demo/dist

  build-mock-api-image:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/luma-mock-api/Dockerfile
          push: false
          tags: luma-mock-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
